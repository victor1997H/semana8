name: Aplicación Python (Semana 8)

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  construir-y-desplegar:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configurar Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: 🔐 Inicia sesión en GitHub Packages (GHCR)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: victor1997h
        password: ${{ secrets.GHCR_TOKEN }}

    - name: 🏗️ Construir y Publicar Paquete Docker
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ghcr.io/victor1997h/semana8:1.0.0

    - name: 🧾 Transferir archivo stack.yml al VPS
      uses: appleboy/scp-action@v1
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        password: ${{ secrets.VPS_PASSWORD }}
        port: ${{ secrets.VPS_SSH_PORT }}
        source: "stack.yml"
        target: "/home/${{ secrets.VPS_USER }}/despliegue"

    - name: 🚀 Desplegar Servicio en Docker Swarm
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        password: ${{ secrets.VPS_PASSWORD }}
        port: ${{ secrets.VPS_SSH_PORT }}
        script: |
          cd ~/despliegue
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u victor1997h --password-stdin
          docker pull ghcr.io/victor1997h/semana8:1.0.0
          docker stack rm semana8 || true
          sleep 10
          docker stack deploy -c stack.yml semana8